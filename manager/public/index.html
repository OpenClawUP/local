<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OpenClawUP Local</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #07080a;
      --card: #111214;
      --card-border: rgba(255,255,255,0.06);
      --text: #f1f5f9;
      --text-muted: #64748b;
      --green: #46ec13;
      --green-dim: rgba(70,236,19,0.1);
      --red: #ef4444;
      --red-dim: rgba(239,68,68,0.1);
      --blue: #3b82f6;
      --blue-dim: rgba(59,130,246,0.1);
      --orange: #f97316;
      --orange-dim: rgba(249,115,22,0.1);
      --radius: 12px;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 2rem;
    }

    .container {
      max-width: 640px;
      margin: 0 auto;
    }

    /* Header */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 2rem;
    }

    .header h1 {
      font-size: 1.5rem;
      font-weight: 700;
    }

    .header h1 span {
      color: var(--green);
    }

    .version {
      font-size: 0.75rem;
      color: var(--text-muted);
    }

    /* Cards */
    .card {
      background: var(--card);
      border: 1px solid var(--card-border);
      border-radius: var(--radius);
      padding: 1.25rem;
      margin-bottom: 1rem;
    }

    .card-title {
      font-size: 0.75rem;
      font-weight: 600;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 1rem;
    }

    .card-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 0.75rem;
      margin-bottom: 1rem;
    }

    .card-head .card-title {
      margin-bottom: 0;
    }

    /* Status */
    .status-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 0.75rem;
    }

    .status-row:last-child { margin-bottom: 0; }

    .status-label {
      font-size: 0.875rem;
      color: var(--text-muted);
    }

    .status-value {
      font-size: 0.875rem;
      font-weight: 500;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 0.375rem;
      padding: 0.25rem 0.625rem;
      border-radius: 9999px;
      font-size: 0.75rem;
      font-weight: 500;
    }

    .badge-green {
      background: var(--green-dim);
      color: var(--green);
    }

    .badge-red {
      background: var(--red-dim);
      color: var(--red);
    }

    .badge-blue {
      background: var(--blue-dim);
      color: var(--blue);
    }

    .dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      display: inline-block;
    }

    .dot-green { background: var(--green); }
    .dot-red { background: var(--red); }

    /* Buttons */
    .btn-row {
      display: flex;
      gap: 0.5rem;
      margin-top: 1rem;
    }

    .btn {
      padding: 0.5rem 1rem;
      border-radius: 8px;
      border: 1px solid var(--card-border);
      background: rgba(255,255,255,0.05);
      color: var(--text);
      font-size: 0.8125rem;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.15s;
    }

    .btn:hover {
      background: rgba(255,255,255,0.1);
      border-color: rgba(255,255,255,0.15);
    }

    .btn-green {
      background: rgba(70,236,19,0.1);
      border-color: rgba(70,236,19,0.2);
      color: var(--green);
    }

    .btn-green:hover {
      background: rgba(70,236,19,0.2);
    }

    .btn-red {
      background: rgba(239,68,68,0.1);
      border-color: rgba(239,68,68,0.2);
      color: var(--red);
    }

    .btn-red:hover {
      background: rgba(239,68,68,0.2);
    }

    .btn-sm {
      padding: 0.25rem 0.625rem;
      font-size: 0.75rem;
    }

    .btn[disabled] {
      opacity: 0.45;
      cursor: not-allowed;
    }

    /* Channel list */
    .channel-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.625rem 0;
      border-bottom: 1px solid var(--card-border);
    }

    .channel-item:last-child { border-bottom: none; }

    .channel-name {
      font-size: 0.875rem;
      font-weight: 500;
      text-transform: capitalize;
    }

    /* Model select */
    .select-wrap {
      position: relative;
    }

    select {
      width: 100%;
      padding: 0.5rem 0.75rem;
      border-radius: 8px;
      border: 1px solid var(--card-border);
      background: #1a1b1e;
      color: var(--text);
      font-size: 0.875rem;
      cursor: pointer;
    }

    select option {
      background: #1a1b1e;
      color: var(--text);
    }

    select:focus {
      outline: none;
      border-color: var(--green);
    }

    /* Add channel */
    .add-form {
      display: none;
      margin-top: 0.75rem;
      padding-top: 0.75rem;
      border-top: 1px solid var(--card-border);
    }

    .add-form.show { display: block; }

    .add-form select,
    .add-form input {
      width: 100%;
      margin-bottom: 0.5rem;
    }

    input[type="text"] {
      padding: 0.5rem 0.75rem;
      border-radius: 8px;
      border: 1px solid var(--card-border);
      background: rgba(255,255,255,0.05);
      color: var(--text);
      font-size: 0.875rem;
    }

    input[type="text"]:focus {
      outline: none;
      border-color: var(--green);
    }

    input[type="text"]::placeholder {
      color: var(--text-muted);
    }

    /* Toggle */
    .toggle {
      position: relative;
      width: 44px;
      height: 24px;
      background: #333;
      border-radius: 12px;
      cursor: pointer;
      transition: background 0.2s;
    }

    .toggle.on { background: var(--green); }

    .toggle-knob {
      position: absolute;
      top: 2px;
      left: 2px;
      width: 20px;
      height: 20px;
      background: white;
      border-radius: 50%;
      transition: transform 0.2s;
    }

    .toggle.on .toggle-knob { transform: translateX(20px); }

    /* Diagnostics */
    .meta-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 0.75rem;
      margin-bottom: 1rem;
    }

    .meta-item {
      padding: 0.875rem;
      border-radius: 10px;
      background: rgba(255,255,255,0.03);
      border: 1px solid var(--card-border);
    }

    .meta-label {
      display: block;
      font-size: 0.75rem;
      color: var(--text-muted);
      margin-bottom: 0.35rem;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    .meta-value {
      font-size: 0.875rem;
      font-weight: 500;
      word-break: break-word;
    }

    .checks {
      display: grid;
      gap: 0.625rem;
    }

    .check-item {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 0.75rem;
      padding: 0.875rem;
      border-radius: 10px;
      background: rgba(255,255,255,0.03);
      border: 1px solid var(--card-border);
    }

    .check-main {
      min-width: 0;
      flex: 1;
    }

    .check-label {
      font-size: 0.875rem;
      font-weight: 600;
      margin-bottom: 0.25rem;
    }

    .check-detail {
      font-size: 0.8125rem;
      color: var(--text-muted);
      line-height: 1.5;
      word-break: break-word;
    }

    .pill {
      flex-shrink: 0;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 56px;
      padding: 0.2rem 0.6rem;
      border-radius: 9999px;
      font-size: 0.75rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    .pill-ok {
      background: var(--green-dim);
      color: var(--green);
    }

    .pill-warn {
      background: var(--orange-dim);
      color: var(--orange);
    }

    .details {
      margin-top: 0.875rem;
    }

    .details summary {
      cursor: pointer;
      color: var(--text-muted);
      font-size: 0.8125rem;
      user-select: none;
    }

    .details-block {
      margin-top: 0.625rem;
      padding: 0.875rem;
      border-radius: 10px;
      border: 1px solid var(--card-border);
      background: rgba(255,255,255,0.02);
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
      font-size: 0.75rem;
      line-height: 1.6;
      color: #cbd5e1;
      white-space: pre-wrap;
      word-break: break-word;
      overflow-x: auto;
    }

    .details-empty {
      color: var(--text-muted);
    }

    /* Logs */
    .toolbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 0.75rem;
      margin-bottom: 0.875rem;
      flex-wrap: wrap;
    }

    .toolbar-group {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      flex-wrap: wrap;
    }

    .hint {
      font-size: 0.75rem;
      color: var(--text-muted);
    }

    .log-panel {
      min-height: 260px;
      max-height: 420px;
      overflow: auto;
      padding: 0.95rem;
      border-radius: 10px;
      border: 1px solid var(--card-border);
      background: #0b0d10;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
      font-size: 0.75rem;
      line-height: 1.55;
      color: #d8dee9;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .log-meta {
      margin-top: 0.75rem;
      font-size: 0.75rem;
      color: var(--text-muted);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 0.75rem;
      flex-wrap: wrap;
    }

    .empty-state {
      color: var(--text-muted);
      font-size: 0.8125rem;
      padding: 0.25rem 0;
    }

    /* Upgrade banner */
    .upgrade {
      background: linear-gradient(135deg, rgba(70,236,19,0.08), rgba(59,130,246,0.08));
      border: 1px solid rgba(70,236,19,0.15);
      border-radius: var(--radius);
      padding: 1.25rem;
      margin-top: 1.5rem;
      text-align: center;
    }

    .upgrade p {
      font-size: 0.875rem;
      color: var(--text-muted);
      margin-bottom: 0.75rem;
    }

    .upgrade a {
      display: inline-block;
      padding: 0.5rem 1.5rem;
      background: var(--green);
      color: #000;
      font-weight: 600;
      font-size: 0.875rem;
      border-radius: 9999px;
      text-decoration: none;
      transition: opacity 0.15s;
    }

    .upgrade a:hover { opacity: 0.9; }

    /* Auth modal */
    .auth-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.85);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
    }

    .auth-modal {
      background: var(--card);
      border: 1px solid var(--card-border);
      border-radius: var(--radius);
      padding: 2rem;
      max-width: 400px;
      width: 90%;
    }

    .auth-modal h2 {
      font-size: 1.25rem;
      margin-bottom: 0.5rem;
    }

    .auth-modal p {
      font-size: 0.8125rem;
      color: var(--text-muted);
      margin-bottom: 1rem;
      line-height: 1.5;
    }

    .auth-modal input {
      width: 100%;
      margin-bottom: 0.75rem;
    }

    /* Update banner */
    .update-banner {
      background: rgba(249,115,22,0.1);
      border: 1px solid rgba(249,115,22,0.25);
      border-radius: var(--radius);
      padding: 0.75rem 1rem;
      margin-bottom: 1rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 0.75rem;
      flex-wrap: wrap;
    }

    .update-banner-text {
      font-size: 0.875rem;
      color: var(--orange);
      font-weight: 500;
    }

    .btn-orange {
      background: rgba(249,115,22,0.15);
      border-color: rgba(249,115,22,0.3);
      color: var(--orange);
    }

    .btn-orange:hover {
      background: rgba(249,115,22,0.25);
    }

    /* Token display */
    .token-display {
      display: inline-flex;
      align-items: center;
      gap: 0.375rem;
      font-size: 0.75rem;
      color: var(--text-muted);
      cursor: pointer;
    }

    .token-display:hover {
      color: var(--text);
    }

    /* Loading */
    .loading {
      text-align: center;
      padding: 3rem;
      color: var(--text-muted);
    }

    @media (max-width: 720px) {
      body {
        padding: 1rem;
      }

      .container {
        max-width: 100%;
      }

      .header,
      .card-head,
      .toolbar,
      .log-meta {
        align-items: flex-start;
        flex-direction: column;
      }

      .meta-grid {
        grid-template-columns: 1fr;
      }

      .btn-row {
        flex-wrap: wrap;
      }

      .check-item {
        flex-direction: column;
      }
    }

    /* Skill Builder */
    textarea {
      width: 100%;
      min-height: 80px;
      padding: 0.75rem;
      border-radius: 8px;
      border: 1px solid var(--card-border);
      background: rgba(255,255,255,0.05);
      color: var(--text);
      font-family: inherit;
      font-size: 0.875rem;
      line-height: 1.5;
      resize: vertical;
    }

    textarea:focus {
      outline: none;
      border-color: var(--green);
    }

    textarea::placeholder {
      color: var(--text-muted);
    }

    .skill-prompt-preview {
      padding: 0.875rem;
      border-radius: 10px;
      border: 1px solid var(--card-border);
      background: rgba(255,255,255,0.02);
      font-size: 0.8125rem;
      line-height: 1.6;
      color: #cbd5e1;
      white-space: pre-wrap;
      word-break: break-word;
      max-height: 200px;
      overflow-y: auto;
    }

    .skill-generating {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      padding: 1rem;
      color: var(--text-muted);
      font-size: 0.875rem;
    }

    .skill-generating .spinner {
      margin-bottom: 0;
      width: 18px;
      height: 18px;
    }

    .preset-section {
      margin-top: 1rem;
      padding-top: 0.75rem;
      border-top: 1px solid var(--card-border);
    }

    .preset-label {
      font-size: 0.8125rem;
      color: var(--text-muted);
      margin-bottom: 0.5rem;
    }

    .preset-row {
      display: flex;
      flex-wrap: wrap;
      gap: 0.375rem;
    }

    .btn-preset {
      padding: 0.3rem 0.625rem;
      border-radius: 8px;
      border: 1px solid var(--card-border);
      background: rgba(255,255,255,0.04);
      color: var(--text-muted);
      font-size: 0.75rem;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.15s;
    }

    .btn-preset:hover {
      background: rgba(59,130,246,0.1);
      border-color: rgba(59,130,246,0.25);
      color: var(--blue);
    }

    .btn-preset[disabled] {
      opacity: 0.45;
      cursor: not-allowed;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .spinner {
      display: inline-block;
      width: 24px;
      height: 24px;
      border: 2px solid var(--card-border);
      border-top-color: var(--green);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-bottom: 0.75rem;
    }
  </style>
</head>
<body>
  <div class="container" id="app">
    <div class="loading">
      <div class="spinner"></div>
      <p>Loading...</p>
    </div>
  </div>

  <script>
    const API = "";
    let authToken = localStorage.getItem("managerToken") || "";

    function showAuthModal() {
      document.getElementById("app").innerHTML = `
        <div class="auth-overlay">
          <div class="auth-modal">
            <h2>Access Token Required</h2>
            <p>Enter your manager access token to continue. The token was displayed in your terminal after installation.</p>
            <input type="text" id="auth-token-input" placeholder="Paste your access token here">
            <button class="btn btn-green" onclick="submitAuth()" style="width:100%">Unlock</button>
          </div>
        </div>
      `;
      setTimeout(() => document.getElementById("auth-token-input")?.focus(), 100);
    }

    function submitAuth() {
      const input = document.getElementById("auth-token-input");
      const token = input?.value?.trim();
      if (!token) return;
      authToken = token;
      localStorage.setItem("managerToken", token);
      refresh();
    }

    function copyToken() {
      if (!authToken) return;
      navigator.clipboard.writeText(authToken)
        .then(() => {
          const el = document.getElementById("token-copied");
          if (el) { el.textContent = "Copied!"; setTimeout(() => { el.textContent = ""; }, 1500); }
        })
        .catch(() => {});
    }

    const ALL_CHANNELS = [
      "telegram", "discord", "whatsapp", "slack", "signal",
      "irc", "matrix", "mattermost", "microsoft-teams", "google-chat",
      "line", "feishu", "twitch", "nostr", "bluebubbles",
      "synology-chat", "nextcloud-talk", "tlon", "zalo", "webchat",
    ];

    const CHANNEL_LABELS = {
      telegram: "Telegram",
      discord: "Discord",
      whatsapp: "WhatsApp",
      slack: "Slack",
      signal: "Signal",
      irc: "IRC",
      matrix: "Matrix",
      mattermost: "Mattermost",
      "microsoft-teams": "Microsoft Teams",
      "google-chat": "Google Chat",
      line: "LINE",
      feishu: "Feishu",
      twitch: "Twitch",
      nostr: "Nostr",
      bluebubbles: "BlueBubbles",
      "synology-chat": "Synology Chat",
      "nextcloud-talk": "Nextcloud Talk",
      tlon: "Tlon",
      zalo: "Zalo",
      webchat: "WebChat",
    };

    let state = {
      running: false,
      version: "",
      uptime: "",
      channels: [],
      model: "",
      autoStart: true,
      aiMode: "proxy",
      availableModels: [],
      selectedLogSource: "gateway",
      logLines: 120,
      logs: null,
      diagnostics: null,
      skill: null,
      skillGenerating: false,
      skillDraft: null,
      updateInfo: null,
      updating: false,
    };

    const LOG_SOURCES = {
      gateway: "Gateway stdout",
      gatewayError: "Gateway stderr",
      manager: "Manager stdout",
      managerError: "Manager stderr",
    };

    async function api(path, opts = {}) {
      const headers = { "Content-Type": "application/json", ...(opts.headers || {}) };
      if (authToken) {
        headers["Authorization"] = `Bearer ${authToken}`;
      }
      const res = await fetch(API + path, { ...opts, headers });
      if (res.status === 401) {
        localStorage.removeItem("managerToken");
        authToken = "";
        showAuthModal();
        throw new Error("Unauthorized");
      }
      return res.json();
    }

    async function refresh() {
      try {
        const [status, logs, diagnostics, skill] = await Promise.all([
          api("/api/status"),
          api(`/api/logs?source=${encodeURIComponent(state.selectedLogSource)}&lines=${state.logLines}`),
          api("/api/diagnostics"),
          api("/api/config/skill"),
        ]);
        state = {
          ...status,
          selectedLogSource: state.selectedLogSource,
          logLines: state.logLines,
          logs,
          diagnostics,
          skill,
          skillGenerating: state.skillGenerating,
          skillDraft: state.skillDraft,
          updateInfo: state.updateInfo,
          updating: state.updating,
        };
        render();
        // Check for updates in background (non-blocking)
        checkForUpdates();
      } catch (e) {
        if (e.message === "Unauthorized") return; // Auth modal already shown
        throw e;
      }
    }

    async function checkForUpdates() {
      try {
        const info = await api("/api/updates");
        state.updateInfo = info;
        render();
      } catch {
        // Non-fatal: update check failure should not break the UI
      }
    }

    async function performUpdate() {
      if (state.updating) return;
      if (!confirm("This will update OpenClaw and the manager. Continue?")) return;
      state.updating = true;
      render();
      try {
        const result = await api("/api/update", { method: "POST" });
        state.updating = false;
        state.updateInfo = null;
        if (result.managerRestartNeeded) {
          alert("Update complete. The manager service needs to restart. The page will reload in a few seconds.");
          setTimeout(() => location.reload(), 5000);
        } else if (result.errors?.length > 0) {
          alert("Update finished with errors:\\n" + result.errors.join("\\n"));
        } else {
          alert("Update complete!");
        }
        await refresh();
      } catch (e) {
        state.updating = false;
        render();
        alert("Update failed: " + (e.message || "Unknown error"));
      }
    }

    async function doAction(action) {
      await api(`/api/${action}`, { method: "POST" });
      setTimeout(refresh, 1500);
    }

    async function changeModel(model) {
      await api("/api/config/model", { method: "PUT", body: JSON.stringify({ model }) });
      await doAction("restart");
    }

    function onModelPresetChange(value) {
      const custom = document.getElementById("custom-model-fields");
      if (custom) custom.style.display = value === "__custom__" ? "" : "none";
    }

    async function addModel() {
      const presetEl = document.getElementById("new-model-preset");
      const presetVal = presetEl?.value;
      let modelId, displayName;

      if (!presetEl || presetVal === "__custom__") {
        modelId = document.getElementById("new-model-id")?.value?.trim();
        if (!modelId) return alert("Please enter a model ID");
        displayName = document.getElementById("new-model-name")?.value?.trim() || modelId;
      } else {
        const preset = state.modelPresets.find(p => p.id === presetVal);
        modelId = preset.id;
        displayName = preset.name;
      }

      const res = await api("/api/config/model", {
        method: "POST",
        body: JSON.stringify({ modelId, displayName }),
      });
      if (res?.error) return alert(res.error);
      document.getElementById("add-model-form")?.classList.remove("show");
      if (res?.fullId) await changeModel(res.fullId);
      else await refresh();
    }

    async function removeCurrentModel() {
      if (!confirm("Remove the currently selected model?")) return;
      const res = await api("/api/config/model", {
        method: "DELETE",
        body: JSON.stringify({ modelId: state.model }),
      });
      if (res?.error) return alert(res.error);
      await doAction("restart");
    }

    async function toggleAutoStart() {
      const enabled = !state.autoStart;
      await api("/api/config/autostart", { method: "PUT", body: JSON.stringify({ enabled }) });
      state.autoStart = enabled;
      render();
    }

    async function removeChannel(channelId) {
      if (state.channels.length <= 1) {
        alert("You need at least one channel.");
        return;
      }
      if (!confirm(`Remove ${channelId}?`)) return;
      await api("/api/config/channel", {
        method: "PUT",
        body: JSON.stringify({ action: "remove", channelId }),
      });
      await doAction("restart");
    }

    async function addChannel() {
      const sel = document.getElementById("new-channel-select");
      const tokenInput = document.getElementById("new-channel-token");
      const channelId = sel.value;
      const token = tokenInput.value.trim();

      const noTokenChannels = ["whatsapp", "signal", "webchat", "nostr"];
      if (!noTokenChannels.includes(channelId) && !token) {
        alert("Please enter a bot token.");
        return;
      }

      await api("/api/config/channel", {
        method: "PUT",
        body: JSON.stringify({ action: "add", channelId, token: token || undefined }),
      });
      tokenInput.value = "";
      document.getElementById("add-form").classList.remove("show");
      await doAction("restart");
    }

    async function refreshLogs() {
      state.logs = await api(`/api/logs?source=${encodeURIComponent(state.selectedLogSource)}&lines=${state.logLines}`);
      render();
    }

    async function refreshDiagnostics() {
      state.diagnostics = await api("/api/diagnostics");
      render();
    }

    async function downloadDiagnostics() {
      try {
        const dlHeaders = {};
        if (authToken) dlHeaders["Authorization"] = `Bearer ${authToken}`;
        const res = await fetch("/api/diagnostics/download", { headers: dlHeaders });
        if (res.status === 401) {
          localStorage.removeItem("managerToken");
          authToken = "";
          showAuthModal();
          return;
        }
        if (!res.ok) {
          throw new Error("Download failed");
        }

        const blob = await res.blob();
        const url = window.URL.createObjectURL(blob);
        const disposition = res.headers.get("Content-Disposition") || "";
        const fileNameMatch = disposition.match(/filename="([^"]+)"/);
        const fileName = fileNameMatch?.[1] || "openclawup-diagnostics.zip";
        const link = document.createElement("a");
        link.href = url;
        link.download = fileName;
        document.body.appendChild(link);
        link.click();
        link.remove();
        window.URL.revokeObjectURL(url);
      } catch {
        alert("Failed to download diagnostics bundle.");
      }
    }

    async function generateSkill() {
      const desc = document.getElementById("skill-description")?.value?.trim();
      if (!desc) return alert("Please describe what you want your bot to do.");
      state.skillGenerating = true;
      state.skillDraft = null;
      render();
      try {
        const result = await api("/api/config/skill-generate", {
          method: "POST",
          body: JSON.stringify({ description: desc }),
        });
        if (result.error) {
          alert("Generation failed: " + result.error);
          state.skillGenerating = false;
          render();
          return;
        }
        state.skillDraft = { description: desc, systemPrompt: result.systemPrompt };
        state.skillGenerating = false;
        render();
      } catch (e) {
        alert("Generation failed: " + (e.message || "Unknown error"));
        state.skillGenerating = false;
        render();
      }
    }

    async function applySkill() {
      const promptEl = document.getElementById("skill-draft-prompt");
      const systemPrompt = promptEl?.value?.trim();
      if (!systemPrompt) return alert("SOUL.md content cannot be empty.");
      const description = state.skillDraft?.description || "";
      const res = await api("/api/config/skill", {
        method: "PUT",
        body: JSON.stringify({ systemPrompt, description }),
      });
      if (res?.error) return alert("Failed to apply: " + res.error);
      state.skillDraft = null;
      await refresh();
    }

    async function clearSkill() {
      if (!confirm("Remove SOUL.md? Your bot will return to default behavior.")) return;
      await api("/api/config/skill", {
        method: "PUT",
        body: JSON.stringify({ systemPrompt: "", description: "" }),
      });
      state.skillDraft = null;
      await refresh();
    }

    function discardDraft() {
      state.skillDraft = null;
      render();
    }

    async function applyPreset(id) {
      try {
        const presets = await api("/api/config/skill-presets");
        const preset = presets.find(p => p.id === id);
        if (!preset) return alert("Preset not found.");
        const res = await api("/api/config/skill", {
          method: "PUT",
          body: JSON.stringify({ systemPrompt: preset.content, description: preset.name }),
        });
        if (res?.error) return alert("Failed to apply preset: " + res.error);
        state.skillDraft = null;
        await refresh();
      } catch (e) {
        alert("Failed to apply preset: " + (e.message || "Unknown error"));
      }
    }

    function setLogSource(source) {
      state.selectedLogSource = source;
      refreshLogs();
    }

    function escapeHtml(value) {
      return String(value ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#39;");
    }

    function formatTimestamp(value) {
      if (!value) return "Not available";
      const date = new Date(value);
      if (Number.isNaN(date.getTime())) return value;
      return date.toLocaleString();
    }

    function copyDiagnostics() {
      if (!state.diagnostics) return;
      const payload = {
        status: {
          running: state.running,
          version: state.version,
          uptime: state.uptime,
          aiMode: state.aiMode,
          model: state.model,
          channels: state.channels,
        },
        diagnostics: state.diagnostics,
      };

      navigator.clipboard.writeText(JSON.stringify(payload, null, 2))
        .then(() => alert("Diagnostics copied to clipboard."))
        .catch(() => alert("Failed to copy diagnostics."));
    }

    function render() {
      const channelIds = state.channels.map(ch => typeof ch === "string" ? ch : ch.id);
      const availableChannels = ALL_CHANNELS.filter(c => !channelIds.includes(c));
      const models = Array.isArray(state.availableModels) && state.availableModels.length > 0
        ? state.availableModels
        : [{ id: state.model || "unknown", name: state.model || "Unknown model" }];
      const logInfo = state.logs || { exists: false, content: "", lineCount: 0, path: "", updatedAt: null };
      const diagnostics = state.diagnostics || {};
      const checks = Array.isArray(diagnostics.checks) ? diagnostics.checks : [];
      const envKeys = Array.isArray(diagnostics.env?.keys) ? diagnostics.env.keys : [];
      const envMasked = diagnostics.env?.masked || {};
      const paths = diagnostics.paths || {};
      const service = diagnostics.service || {};
      const configPathHint = paths.configPath || "~/.openclaw/openclaw.json";
      const creditAction = state.aiMode === "proxy"
        ? `<div style="margin-top:0.75rem">
             <a href="https://openclawup.com/dashboard/billing" target="_blank"
                class="btn btn-green" style="text-decoration:none;display:inline-block">
               Top up OpenClawUP credits
             </a>
           </div>`
        : `<p style="margin-top:0.75rem;color:var(--text-muted);font-size:0.8125rem">
             Using your own API key. Edit <code>${escapeHtml(configPathHint)}</code> to change providers.
           </p>`;
      const openclawAutoStartPath = paths.openclawAutoStart || paths.openclawLaunchAgent || "unknown";
      const managerAutoStartPath = paths.managerAutoStart || paths.managerLaunchAgent || "unknown";

      const maskedToken = authToken ? authToken.slice(0, 4) + "..." + authToken.slice(-4) : "";
      const updateBanner = state.updateInfo?.updateAvailable
        ? `<div class="update-banner">
             <span class="update-banner-text">Update available: v${escapeHtml(state.updateInfo.latestManagerVersion)}</span>
             <button class="btn btn-sm btn-orange" onclick="performUpdate()" ${state.updating ? 'disabled' : ''}>
               ${state.updating ? 'Updating...' : 'Update Now'}
             </button>
           </div>`
        : '';

      document.getElementById("app").innerHTML = `
        ${updateBanner}
        <div class="header">
          <h1>OpenClaw<span>UP</span> Local</h1>
          <div style="display:flex;align-items:center;gap:0.75rem">
            ${authToken ? `<span class="token-display" onclick="copyToken()" title="Click to copy token">&#128274; ${escapeHtml(maskedToken)} <span id="token-copied" style="color:var(--green);font-size:0.625rem"></span></span>` : ''}
            ${state.running ? `<a href="http://localhost:18789${state.gatewayToken ? '?token=' + encodeURIComponent(state.gatewayToken) : ''}" target="_blank" class="btn btn-green btn-sm" style="text-decoration:none">Open Chat</a>` : ''}
            <span class="version">${state.version}</span>
          </div>
        </div>

        <!-- Status -->
        <div class="card">
          <div class="card-title">Status</div>
          <div class="status-row">
            <span class="status-label">Service</span>
            <span class="badge ${state.running ? 'badge-green' : 'badge-red'}">
              <span class="dot ${state.running ? 'dot-green' : 'dot-red'}"></span>
              ${state.running ? 'Running' : 'Stopped'}
            </span>
          </div>
          <div class="status-row">
            <span class="status-label">Uptime</span>
            <span class="status-value">${state.uptime || '—'}</span>
          </div>
          <div class="status-row">
            <span class="status-label">Auto-start on login</span>
            <div class="toggle ${state.autoStart ? 'on' : ''}" onclick="toggleAutoStart()">
              <div class="toggle-knob"></div>
            </div>
          </div>
          <div class="btn-row">
            ${state.running
              ? `<button class="btn btn-red" onclick="doAction('stop')">Stop</button>
                 <button class="btn" onclick="doAction('restart')">Restart</button>`
              : `<button class="btn btn-green" onclick="doAction('start')">Start</button>`
            }
          </div>
        </div>

        <!-- Skill Builder -->
        <div class="card">
          <div class="card-head">
            <div class="card-title">Skill</div>
            ${state.skill?.systemPrompt ? `<button class="btn btn-sm btn-red" onclick="clearSkill()">Clear</button>` : ''}
          </div>
          ${state.skill?.systemPrompt && !state.skillDraft ? `
            <div style="margin-bottom:0.75rem">
              ${state.skill.description ? `<p style="font-size:0.8125rem;color:var(--text-muted);margin-bottom:0.5rem">
                <strong style="color:var(--text)">Description:</strong> ${escapeHtml(state.skill.description)}
              </p>` : ''}
              <div class="skill-prompt-preview">${escapeHtml(state.skill.systemPrompt)}</div>
              <p style="margin-top:0.5rem;font-size:0.75rem;color:var(--text-muted)">
                Saved to <code>${escapeHtml(state.skill.soulPath || 'SOUL.md')}</code> — changes apply on next message.
              </p>
            </div>
          ` : ''}
          ${state.skillGenerating ? `
            <div class="skill-generating">
              <div class="spinner"></div>
              Generating skill with AI...
            </div>
          ` : state.skillDraft ? `
            <div>
              <p style="font-size:0.8125rem;color:var(--text-muted);margin-bottom:0.5rem">
                Review and edit, then apply. This will be saved as <code>SOUL.md</code> in your OpenClaw workspace.
              </p>
              <textarea id="skill-draft-prompt" rows="8" style="min-height:140px">${escapeHtml(state.skillDraft.systemPrompt)}</textarea>
              <div class="btn-row">
                <button class="btn btn-green" onclick="applySkill()">Apply</button>
                <button class="btn" onclick="generateSkill()">Regenerate</button>
                <button class="btn" onclick="discardDraft()">Discard</button>
              </div>
            </div>
          ` : `
            <p style="font-size:0.8125rem;color:var(--text-muted);margin-bottom:0.75rem">
              ${state.skill?.systemPrompt
                ? 'Generate a new skill to replace the current one:'
                : 'Describe what you want your bot to do, and AI will generate a SOUL.md that defines its personality and behavior.'}
            </p>
            <textarea id="skill-description" rows="3" placeholder="e.g., I run a small bakery. I want my bot to answer questions about our menu, opening hours, and help customers place simple orders...">${escapeHtml(state.skill?.description || '')}</textarea>
            <div class="btn-row">
              <button class="btn btn-green" onclick="generateSkill()">Generate with AI</button>
            </div>
            <div class="preset-section">
              <p class="preset-label">Or try a preset:</p>
              <div class="preset-row">
                <button class="btn-preset" onclick="applyPreset('writing')">Writing</button>
                <button class="btn-preset" onclick="applyPreset('code')">Code</button>
                <button class="btn-preset" onclick="applyPreset('support')">Support</button>
                <button class="btn-preset" onclick="applyPreset('study')">Study</button>
                <button class="btn-preset" onclick="applyPreset('translator')">Translator</button>
              </div>
            </div>
          `}
        </div>

        <!-- Channels -->
        <div class="card">
          <div class="card-title">Channels</div>
          ${state.channels.map(ch => {
            const chId = typeof ch === "string" ? ch : ch.id;
            const botName = typeof ch === "object" ? ch.botName : null;
            return `
            <div class="channel-item">
              <div>
                <span class="channel-name">${CHANNEL_LABELS[chId] || chId}</span>
                ${botName ? `<span style="margin-left:0.5rem;font-size:0.75rem;color:var(--text-muted)">${escapeHtml(botName)}</span>` : ''}
              </div>
              <button class="btn btn-sm btn-red" onclick="removeChannel('${chId}')">Remove</button>
            </div>`;
          }).join("")}
          ${state.channels.length === 0 ? '<p style="color:var(--text-muted);font-size:0.875rem">No channels configured</p>' : ''}
          <div class="btn-row">
            <button class="btn btn-sm btn-green" onclick="document.getElementById('add-form').classList.toggle('show')">+ Add Channel</button>
          </div>
          <div class="add-form" id="add-form">
            <select id="new-channel-select">
              ${availableChannels.map(c => `<option value="${c}">${CHANNEL_LABELS[c] || c}</option>`).join("")}
            </select>
            <input type="text" id="new-channel-token" placeholder="Bot token (if required)">
            <div class="btn-row">
              <button class="btn btn-green" onclick="addChannel()">Add</button>
            </div>
          </div>
        </div>

        <!-- AI Model -->
        <div class="card">
          <div class="card-title">AI Model</div>
          <div class="select-wrap">
            <select onchange="changeModel(this.value)">
              ${models.map(m => `
                <option value="${m.id}" ${state.model === m.id ? 'selected' : ''}>
                  ${m.name}${m.tag ? ` (${m.tag})` : ''}
                </option>
              `).join("")}
           </select>
          </div>
          ${models.length > 1 ? `<div style="margin-top:0.5rem">
            <button class="btn btn-sm btn-red" onclick="removeCurrentModel()">Remove selected model</button>
          </div>` : ''}
          <div class="btn-row" style="margin-top:0.75rem">
            <button class="btn btn-sm btn-green" onclick="document.getElementById('add-model-form').classList.toggle('show')">+ Add Model</button>
          </div>
          <div class="add-form" id="add-model-form">
            ${state.modelPresets && state.modelPresets.length > 0 ? `
              <select id="new-model-preset" onchange="onModelPresetChange(this.value)">
                ${state.modelPresets.map(p => `<option value="${p.id}">${p.name} (${p.id})</option>`).join("")}
                <option value="__custom__">Custom model...</option>
              </select>
            ` : ''}
            <div id="custom-model-fields" style="${state.modelPresets && state.modelPresets.length > 0 ? 'display:none' : ''}">
              <input type="text" id="new-model-id" placeholder="Model ID (e.g. gemini-2.5-pro)">
              <input type="text" id="new-model-name" placeholder="Display name (optional)">
            </div>
            <div class="btn-row">
              <button class="btn btn-green" onclick="addModel()">Add</button>
            </div>
          </div>
          ${creditAction}
        </div>

        <!-- Logs -->
        <div class="card">
          <div class="card-head">
            <div class="card-title">Logs</div>
            <button class="btn btn-sm" onclick="refreshLogs()">Refresh logs</button>
          </div>
          <div class="toolbar">
            <div class="toolbar-group">
              <select onchange="setLogSource(this.value)">
                ${Object.entries(LOG_SOURCES).map(([id, label]) => `
                  <option value="${id}" ${state.selectedLogSource === id ? 'selected' : ''}>${label}</option>
                `).join("")}
              </select>
            </div>
            <span class="hint">Showing last ${state.logLines} lines</span>
          </div>
          <div class="log-panel">${logInfo.exists
            ? escapeHtml(logInfo.content || "Log file is empty.")
            : escapeHtml("Log file not found yet. Start the service and refresh to collect output.")}</div>
          <div class="log-meta">
            <span>${escapeHtml(logInfo.path || "Unknown path")}</span>
            <span>${logInfo.exists ? `${logInfo.lineCount} lines • updated ${formatTimestamp(logInfo.updatedAt)}` : "Waiting for first log file"}</span>
          </div>
        </div>

        <!-- Diagnostics -->
        <div class="card">
          <div class="card-head">
            <div class="card-title">Diagnostics</div>
            <div class="toolbar-group">
              <button class="btn btn-sm" onclick="downloadDiagnostics()">Download diagnostics</button>
              <button class="btn btn-sm" onclick="refreshDiagnostics()">Refresh checks</button>
              <button class="btn btn-sm btn-green" onclick="copyDiagnostics()" ${state.diagnostics ? "" : "disabled"}>Copy JSON</button>
            </div>
          </div>
          <div class="meta-grid">
            <div class="meta-item">
              <span class="meta-label">OpenClaw</span>
              <span class="meta-value">${escapeHtml(diagnostics.openclawVersion || state.version || "unknown")}</span>
            </div>
            <div class="meta-item">
              <span class="meta-label">Node</span>
              <span class="meta-value">${escapeHtml(diagnostics.nodeVersion || "unknown")}</span>
            </div>
            <div class="meta-item">
              <span class="meta-label">Platform</span>
              <span class="meta-value">${escapeHtml(diagnostics.platform || "unknown")}</span>
            </div>
            <div class="meta-item">
              <span class="meta-label">Generated</span>
              <span class="meta-value">${escapeHtml(formatTimestamp(diagnostics.generatedAt))}</span>
            </div>
          </div>
          <div class="checks">
            ${checks.length > 0 ? checks.map(check => `
              <div class="check-item">
                <div class="check-main">
                  <div class="check-label">${escapeHtml(check.label || check.id || "Check")}</div>
                  <div class="check-detail">${escapeHtml(check.detail || "No detail provided.")}</div>
                </div>
                <span class="pill ${check.ok ? 'pill-ok' : 'pill-warn'}">${check.ok ? 'OK' : 'Warn'}</span>
              </div>
            `).join("") : '<div class="empty-state">Diagnostics are not available yet.</div>'}
          </div>
          <details class="details">
            <summary>Environment keys</summary>
            <div class="details-block ${envKeys.length === 0 ? 'details-empty' : ''}">${envKeys.length > 0
              ? escapeHtml(envKeys.map(key => `${key}=${envMasked[key] || "****"}`).join("\n"))
              : "No environment variables found."}</div>
          </details>
          <details class="details">
            <summary>Paths and services</summary>
            <div class="details-block">${escapeHtml([
              `openclawDir: ${paths.openclawDir || "unknown"}`,
              `managerDir: ${paths.managerDir || "unknown"}`,
              `configPath: ${paths.configPath || "unknown"}`,
              `envPath: ${paths.envPath || "unknown"}`,
              `openclawAutoStart: ${openclawAutoStartPath}`,
              `managerAutoStart: ${managerAutoStartPath}`,
              "",
              `openclawLoaded: ${service.openclaw?.loaded ? "yes" : "no"}`,
              `openclawDetails: ${service.openclaw?.details || "unknown"}`,
              `managerLoaded: ${service.manager?.loaded ? "yes" : "no"}`,
              `managerDetails: ${service.manager?.details || "unknown"}`,
            ].join("\n"))}</div>
          </details>
        </div>

        <!-- Upgrade -->
        <div class="upgrade">
          <p>Want 24/7 uptime without keeping your computer on?</p>
          <a href="https://openclawup.com?ref=local" target="_blank">
            Upgrade to OpenClawUP Cloud &rarr;
          </a>
        </div>
      `;
    }

    // Initial load — check auth first
    async function init() {
      if (!authToken) {
        // Try to see if no token is required (fresh install, open access)
        try {
          const res = await fetch(API + "/api/status");
          if (res.status === 401) {
            showAuthModal();
            return;
          }
          // No auth needed or token not set yet — proceed
        } catch {
          // Server not reachable
        }
      }
      refresh();
    }
    init();
    // Auto-refresh every 30s
    setInterval(() => { if (authToken || !document.querySelector(".auth-overlay")) refresh(); }, 30000);
  </script>
</body>
</html>
